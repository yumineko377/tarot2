<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:#0a0618;color:#e0d8ec;font-family:'Noto Serif SC',serif;min-height:100vh}

.table-area{width:100%;max-width:940px;position:relative;overflow:hidden;padding-top:10px}.table-wrap{width:100%;padding:4px 0;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;cursor:grab}.table-wrap::-webkit-scrollbar{height:4px}.table-wrap::-webkit-scrollbar-thumb{background:rgba(200,160,240,0.2);border-radius:2px}

.back-btn{padding:8px 22px;border-radius:8px;border:1.5px solid rgba(200,160,240,0.2);background:rgba(255,255,255,0.04);color:#8b6faf;font-size:.75rem;font-family:inherit;cursor:pointer;transition:all .2s;margin:8px}.back-btn:hover{background:rgba(160,120,220,0.15);border-color:rgba(200,160,240,0.4);color:#c8b8e0}
/* P2 牌阵选择 */
.spread-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:900px;padding:8px}.spread-item{padding:12px 16px;border-radius:14px;border:1.5px solid rgba(200,160,240,0.2);background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;min-width:140px;text-align:center}.spread-item:hover{background:rgba(160,120,220,0.2);border-color:rgba(200,160,240,0.5)}.spread-item .s-name{font-size:.85rem;color:#d8c8f0;font-weight:700}.spread-item .s-desc{font-size:.65rem;color:#8b6faf}

.spread-grid{display:grid;gap:12px;justify-content:center;align-items:start;padding:8px;margin:0 auto}
.spread-grid.cross{grid-template-columns:repeat(3,auto);grid-template-rows:repeat(3,auto)}
.spread-grid.two-rows{grid-template-columns:repeat(4,auto)}
.spread-grid.one-row{grid-template-columns:repeat(5,auto)}
.spread-grid.grid-2x2{grid-template-columns:repeat(2,auto)}
.spread-grid.grid-3x2{grid-template-columns:repeat(3,auto)}
.spread-grid.triangle{grid-template-columns:repeat(3,auto);grid-template-rows:repeat(3,auto)}
.spread-grid.flex-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;max-width:700px}
.spread-grid.pyramid{grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto}
.spread-grid.top3-bottom4{grid-template-columns:repeat(4,1fr)}

.slot-label{text-align:center;line-height:1.2;max-width:110px}.slot-label .slot-title{color:#e8dcf8;font-weight:700;font-size:.62rem;display:block}.slot-label .slot-desc{color:#8b6faf;font-size:.55rem}
/* P1/P4 翻牌 */
.reveal-page{padding-top:12px;overflow-y:auto;overflow-x:hidden}.reveal-page h2{font-family:'Cinzel',serif;font-size:1.2rem;color:#d4bff0;margin-bottom:2px}.rev-sub{font-size:.68rem;color:#6b4f8a;margin-bottom:8px}

.rev-label{text-align:center;font-size:.72rem;font-weight:700;color:#d8c8f0;margin-top:2px;opacity:0;transition:opacity .35s}.rev-card.flipped .rev-label{opacity:1}.rev-label .rev-pos-tag{font-size:.6rem;margin-left:3px;padding:2px 6px;border-radius:99px}.rev-pos-tag.up{background:rgba(100,180,140,0.18);color:#6ab88a}.rev-pos-tag.rev{background:rgba(200,120,120,0.18);color:#c08080}

.spread-reveal-grid{display:grid;gap:16px;justify-content:center;align-items:start;padding:8px}
.spread-reveal-grid.cross{grid-template-columns:repeat(3,1fr)}.spread-reveal-grid.two-rows{grid-template-columns:repeat(4,1fr)}.spread-reveal-grid.one-row{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}.spread-reveal-grid.grid-2x2{grid-template-columns:repeat(2,1fr)}.spread-reveal-grid.grid-3x2{grid-template-columns:repeat(3,1fr)}.spread-reveal-grid.triangle{grid-template-columns:repeat(3,1fr)}.spread-reveal-grid.column{grid-template-columns:1fr}
.spread-reveal-grid.flex-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:750px}
.spread-reveal-grid.pyramid{grid-template-columns:repeat(3,1fr)}
.spread-reveal-grid.top3-bottom4{grid-template-columns:repeat(4,1fr)}
.rev-card-pos{display:flex;flex-direction:column;align-items:center;gap:4px}.rev-card-pos .rev-card-inner{width:100px;height:170px}.rev-card-pos.flipped .rev-card-inner{transform:rotateY(180deg)}.rev-card-pos.reversed .rev-front img{transform:rotate(180deg)}.rev-card-pos .rev-label{opacity:0;transition:opacity .35s}.rev-card-pos.flipped .rev-label{opacity:1}.rev-card-pos .rev-label .rp-pos{font-size:.6rem;color:#8b6faf;display:block}
/* 复制区 */
.copy-box{text-align:center;margin:40px 0 20px;display:none;flex-direction:column;align-items:center;gap:44px}
.copy-box input{width:300px;max-width:90vw;padding:10px 16px;border-radius:10px;border:1.5px solid rgba(200,160,240,0.3);background:rgba(255,255,255,0.05);color:#d8c8f0;font-size:.82rem;font-family:inherit;text-align:center;transition:all .2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);outline:none}
.copy-box input::placeholder{color:#6b4f8a}.copy-box input:focus{border-color:rgba(200,160,240,0.6);background:rgba(255,255,255,0.08)}
.copy-box label{font-size:.7rem;color:#8b6faf;letter-spacing:.04em}
.copy-btn{padding:10px 32px;border-radius:12px;border:1.5px solid rgba(100,200,160,0.3);background:rgba(40,120,80,0.12);color:#8ad8b0;font-size:.85rem;font-family:inherit;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px)}
.copy-btn:hover{background:rgba(60,160,100,0.22);border-color:rgba(100,200,160,0.55);color:#b0f0d0}
.copy-btn.copied{background:rgba(60,160,100,0.28);color:#d0ffe8;border-color:rgba(100,200,160,0.6)}

  body{overflow:hidden;touch-action:pan-y}

  .hero h1{font-size:1.3rem}.meditation-hint{font-size:.58rem}.btn{padding:8px 16px;font-size:.7rem}.top-bar button,.top-bar .count{padding:5px 10px;font-size:.65rem}

}
</style></head><body>

<script>
const M=[["The Fool","愚者","🌟","新的开始·冒险·天真","鲁莽·犹豫·错失良机"],["The Magician","魔术师","🪄","创造力·技能·意志力","欺骗·滥用能力·缺乏计划"],["The High Priestess","女祭司","🌙","直觉·神秘·潜意识","忽视直觉·秘密泄露·肤浅"],["The Empress","皇后","👑","丰饶·母性·感官享受","依赖·创造力枯竭·过度保护"],["The Emperor","皇帝","🏰","权威·稳定·领导力","专制·失控·缺乏纪律"],["The Hierophant","教皇","📿","传统·信仰·导师","反叛·打破常规·盲目追随"],["The Lovers","恋人","💕","爱情·和谐·选择","分离·背叛·价值观冲突"],["The Chariot","战车","⚔️","胜利·意志力·前进","失控·失败·方向迷失"],["Strength","力量","🦁","勇气·耐心·内在力量","软弱·自我怀疑·失控"],["The Hermit","隐者","🏮","内省·智慧·独处","孤立·逃避·固执"],["Wheel of Fortune","命运之轮","🎡","转折·机遇·命运","厄运·停滞·无法掌控"],["Justice","正义","⚖️","公正·真相·因果","不公·逃避责任·偏见"],["The Hanged Man","倒吊人","🪢","牺牲·换个角度·等待","拖延·无谓牺牲·固执"],["Death","死神","💀","结束·转变·重生","抗拒改变·停滞·恐惧"],["Temperance","节制","🌊","平衡·调和·耐心","极端·失衡·放纵"],["The Devil","恶魔","😈","欲望·束缚·执念","挣脱·觉醒·摆脱依赖"],["The Tower","高塔","🗼","崩塌·觉醒·剧变","逃避改变·勉强维持"],["The Star","星星","⭐","希望·治愈·灵感","绝望·失去信心·失落"],["The Moon","月亮","🌕","幻象·恐惧·潜意识","真相浮现·克服恐惧"],["The Sun","太阳","☀️","快乐·成功·活力","短暂快乐·过度乐观"],["Judgement","审判","📯","觉醒·重生·召唤","逃避审判·自我怀疑"],["The World","世界","🌍","完成·圆满·成就","未完成·停滞·缺失"]];

function shuf(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}

// P1
function goReveal(){if(selectedCards.size===0){bid('hint').textContent='请先选牌！';return}let grid=bid('revealGrid');grid.innerHTML='';let arr=Array.from(selectedCards).sort((a,b)=>a-b),cards=arr.map(i=>deck[i]);let bp=[];bp.push('请帮我解读以下塔罗牌：\n');cards.forEach((c,i)=>{let el=document.createElement('div');el.className='rev-card'+(c.reversed?' reversed':'');let isrc='PaiMian/'+c.en.replace(/ /g,'_')+'.png';el.innerHTML='<div class="rev-card-inner"><div class="rev-face rev-back"><img src="card_back.png" alt=""></div><div class="rev-face rev-front"><img src="'+isrc+'" alt="'+c.zh+'" onerror="this.parentElement.innerHTML=\'<div style=font-size:2rem>'+c.icon+'</div>\'"></div></div><div class="rev-label">'+c.icon+' '+c.zh+'<span class="rev-pos-tag '+(c.reversed?'rev':'up')+'">'+(c.reversed?'逆位':'正位')+'</span></div>';bp.push('第'+(i+1)+'张：'+c.zh+'（'+c.en+'）—— '+(c.reversed?'逆位':'正位')+',关键词：'+(c.reversed?c.rev:c.up));grid.appendChild(el)});bp.push('\n请综合以上塔罗牌，给出详细解读。');let b=bid('copyBtn');b.dataset.basePrompt=bp.join('\n');bid('questionInput').value='';updatePT();bid('revSub').textContent=drawCount+' 张牌 · 点击牌背翻开';document.querySelectorAll('#revealGrid .rev-card').forEach(el=>{el.addEventListener('click',function(){if(el.classList.contains('flipped'))return;el.classList.add('flipped');let f=document.querySelectorAll('#revealGrid .rev-card.flipped').length;bid('revSub').textContent='已翻开 '+f+'/'+cards.length+' 张';if(f===cards.length){bid('revSub').textContent='✦ 全部揭开 ✦';bid('copyBox').style.display='flex'}})});bid('copyBox').style.display='none';goPage(1)}

function goSpreads(){renderSpreadList();goPage(2)}

function openSpread(i){spreadIdx=i;let s=SPREADS[i];spreadSlots=new Array(s.cards).fill(null);usedIndices.clear();bid('spreadTitle').textContent=s.name;bid('spreadDesc').textContent=s.cards+'张 · '+s.desc;bid('spreadHint').textContent='点击下方牌桌填充空位——已选过的牌变灰不可重复';bid('spreadRevealBtn').style.animation='';renderSpreadSlots();buildSpreadDeck();renderSpreadTable();goPage(3)}

  let s=SPREADS[spreadIdx],g=bid('spreadGrid');g.className='spread-grid '+s.layout;g.innerHTML='';
  s.pos.forEach((p,i)=>{let el=document.createElement('div');el.className='spread-slot';if(p.r){el.style.gridRow=p.r;el.style.gridColumn=p.c}if(p.span)el.style.gridColumn='span '+p.span;let filled=!!spreadSlots[i];el.innerHTML='<div class="slot-card'+(filled?' filled':'')+'" id="slot'+i+'" onclick="cancelSlot('+i+')">'+(filled?'<img src="card_back.png" alt=""><div class="slot-num" style="position:absolute">'+(i+1)+'</div>':'<div class="slot-num">'+(i+1)+'</div>')+'</div><div class="slot-label"><span class="slot-title">'+p.t+'</span><span class="slot-desc">'+(p.d||'')+'</span></div>';g.appendChild(el)})
}
function buildSpreadDeck(){spreadDeck=shuf(A).map(c=>({...c,reversed:Math.random()<.5}))}
function renderSpreadTable(){let t=bid('spreadTable');t.innerHTML='';spreadDeck.forEach((c,i)=>{let d=document.createElement('div');d.className='card';if(usedIndices.has(i))d.classList.add('used');d.style.transform='rotate('+((Math.random()-.5)*5)+'deg)';d.innerHTML='<div class="card-num">'+(i+1)+'</div><div class="card-inner"><div class="card-back"><img src="card_back.png" alt=""></div></div>';d.addEventListener('click',function(e){e.stopPropagation();fillSlot(i,d)});t.appendChild(d)});let sw=bid('spreadTableWrap');if(sw)sw.scrollLeft=0}
function fillSlot(i,el){if(usedIndices.has(i))return;if(spreadSlots.every(s=>s))return;let idx=spreadSlots.indexOf(null);if(idx===-1)return;spreadSlots[idx]=spreadDeck[i];usedIndices.add(i);renderSpreadSlots();renderSpreadTable();if(spreadSlots.every(s=>s)){bid('spreadHint').textContent='✨ 全部填充完毕，点击翻开牌阵！';bid('spreadRevealBtn').style.animation='pulse 1.5s infinite'}else{bid('spreadHint').textContent='已填充 '+spreadSlots.filter(s=>s).length+'/'+spreadSlots.length+' 个位置'}}
function cancelSlot(i){if(spreadSlots[i]){let idx=spreadDeck.indexOf(spreadSlots[i]);if(idx>=0)usedIndices.delete(idx);spreadSlots[i]=null;renderSpreadSlots();renderSpreadTable();bid('spreadHint').textContent='点击下方牌桌填充空位';bid('spreadRevealBtn').style.animation=''}}
function shuffleSpreadDeck(){buildSpreadDeck();usedIndices.clear();spreadSlots=new Array(SPREADS[spreadIdx].cards).fill(null);renderSpreadSlots();renderSpreadTable();bid('spreadHint').textContent='点击下方牌桌填充空位';bid('spreadRevealBtn').style.animation=''}
const sw2=bid('spreadTableWrap');if(sw2)sw2.addEventListener('wheel',function(e){e.preventDefault();sw2.scrollBy({left:e.deltaY||e.deltaX,behavior:'smooth'})},{passive:false});
function shiftSpreadTable(d){let w=bid('spreadTableWrap');if(w)w.scrollBy({left:d,behavior:'smooth'})}

// === P4 Grid翻牌 ===
function goSpreadReveal(){if(!spreadSlots.every(s=>s)){bid('spreadHint').textContent='请先填满所有牌位！';return}let s=SPREADS[spreadIdx],g=bid('spreadRevealGrid');g.className='spread-reveal-grid '+s.layout;g.innerHTML='';bid('spreadRevealTitle').textContent=s.name;bid('spreadRevealSub').textContent=s.cards+' 张牌 · 点击牌背逐一翻开';let bp=[];bp.push('请用'+s.name+'牌阵解读以下'+s.cards+'张塔罗牌：\n');spreadSlots.forEach((c,i)=>{let el=document.createElement('div');el.className='rev-card-pos'+(c.reversed?' reversed':'');if(s.pos[i].r){el.style.gridRow=s.pos[i].r;el.style.gridColumn=s.pos[i].c}if(s.pos[i].span)el.style.gridColumn='span '+s.pos[i].span;let isrc='PaiMian/'+c.en.replace(/ /g,'_')+'.png';el.innerHTML='<div class="rev-card-inner"><div class="rev-face rev-back"><img src="card_back.png" alt=""></div><div class="rev-face rev-front"><img src="'+isrc+'" alt="'+c.zh+'" onerror="this.parentElement.innerHTML=\'<div style=font-size:1.5rem>'+c.icon+'</div>\'"></div></div><div class="rev-label"><span class="rp-pos">'+s.pos[i].t+'：'+s.pos[i].d+'</span>'+c.icon+' '+c.zh+'<span class="rev-pos-tag '+(c.reversed?'rev':'up')+'">'+(c.reversed?'逆位':'正位')+'</span></div>';bp.push(s.pos[i].t+'（牌'+(i+1)+'）：'+c.zh+'（'+c.en+'）—— '+(c.reversed?'逆位':'正位')+',关键词：'+(c.reversed?c.rev:c.up));g.appendChild(el);el.addEventListener('click',function(){if(el.classList.contains('flipped'))return;el.classList.add('flipped');let f=document.querySelectorAll('#spreadRevealGrid .rev-card-pos.flipped').length;bid('spreadRevealSub').textContent='已翻开 '+f+'/'+spreadSlots.length+' 张';if(f===spreadSlots.length){bid('spreadRevealSub').textContent='✦ 全部揭开 ✦';bid('spreadCopyBox').style.display='flex'}})});bp.push('\n请基于'+s.name+'牌阵的结构，给出每张牌在其位置上的详细解读以及整体关联分析。');bid('spreadCopyBtn').dataset.fullPrompt=bp.join('\n');bid('spreadCopyBox').style.display='none';goPage(4)}
function copySpreadResult(){let t=bid('spreadCopyBtn').dataset.fullPrompt;navigator.clipboard.writeText(t).then(function(){let b=bid('spreadCopyBtn');b.textContent='✅ 已复制！';b.classList.add('copied');setTimeout(function(){b.textContent='📋 复制解牌提示词';b.classList.remove('copied')},2500)})}

buildDeck();renderTable();buildSpreadDeck();renderSpreadTable();
</script>
<script src="https://cdn.jsdelivr.net/npm/ogl@1.0.9/dist/ogl.umd.js"></script>
<script>
(function(){
const c=document.getElementById('galaxyBg'),gl=new OGL.Renderer({canvas:c,alpha:true}).gl;
gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);gl.clearColor(0,0,0,0);
const vs=`attribute vec2 uv,position;varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,0,1);}`;
const fs=`
precision highp float;uniform float uTime,uStarSpeed,uDensity,uHueShift,uSpeed,uGlowIntensity,uSaturation,uTwinkleIntensity,uRotationSpeed,uRepulsionStrength,uMouseActiveFactor,uAutoCenterRepulsion;uniform vec3 uResolution;uniform vec2 uFocal,uRotation,uMouse;uniform bool uMouseRepulsion,uTransparent;varying vec2 vUv;
#define NUM_LAYER 4.0
#define MAT45 mat2(0.7071,-0.7071,0.7071,0.7071)
float H21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float tri(float x){return abs(fract(x)*2.-1.);}
float tris(float x){float t=fract(x);return 1.-smoothstep(0.,1.,abs(2.*t-1.));}
float trisn(float x){float t=fract(x);return 2.*(1.-smoothstep(0.,1.,abs(2.*t-1.)))-1.;}
vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}
float Star(vec2 uv,float flare){float d=length(uv);float m=(.05*uGlowIntensity)/d;float rays=smoothstep(0.,1.,1.-abs(uv.x*uv.y*1000.));m+=rays*flare*uGlowIntensity;uv*=MAT45;rays=smoothstep(0.,1.,1.-abs(uv.x*uv.y*1000.));m+=rays*.3*flare*uGlowIntensity;m*=smoothstep(1.,.2,d);return m;}
vec3 StarLayer(vec2 uv){vec3 col=vec3(0.);vec2 gv=fract(uv)-.5,id=floor(uv);
for(int y=-1;y<=1;y++)for(int x=-1;x<=1;x++){vec2 o=vec2(float(x),float(y)),si=id+o;
float seed=H21(si),size=fract(seed*345.32),gloss=tri(uStarSpeed/(3.*seed+1.)),flareSize=smoothstep(.9,1.,size)*gloss;
float r=smoothstep(.2,1.,H21(si+1.))+.2,b=smoothstep(.2,1.,H21(si+3.))+.2,g=min(r,b)*seed;
vec3 base=vec3(r,g,b);float hue=atan(base.g-base.r,base.b-base.r)/6.283185+.5;hue=fract(hue+uHueShift/360.);
float sat=length(base-vec3(dot(base,vec3(.299,.587,.114))))*uSaturation,val=max(max(base.r,base.g),base.b);base=hsv2rgb(vec3(hue,sat,val));
vec2 pad=vec2(tris(seed*34.+uTime*uSpeed/10.),tris(seed*38.+uTime*uSpeed/30.))-.5;
float star=Star(gv-o-pad,flareSize);vec3 color=base;
float twinkle=trisn(uTime*uSpeed+seed*6.2831)*.5+1.;twinkle=mix(1.,twinkle,uTwinkleIntensity);star*=twinkle;
col+=star*size*color;}return col;}
void main(){vec2 fp=uFocal*uResolution.xy,uv=(vUv*uResolution.xy-fp)/uResolution.y;
if(uAutoCenterRepulsion>0.){vec2 cuv=vec2(0.);float cd=length(uv-cuv);uv+=normalize(uv-cuv)*(uAutoCenterRepulsion/(cd+.1))*.05;}
else if(uMouseRepulsion){vec2 mp=(uMouse*uResolution.xy-fp)/uResolution.y;float md=length(uv-mp);uv+=normalize(uv-mp)*(uRepulsionStrength/(md+.1))*.05*uMouseActiveFactor;}
else{uv+=(uMouse-vec2(.5))*.1*uMouseActiveFactor;}
float ang=uTime*uRotationSpeed;mat2 ar=mat2(cos(ang),-sin(ang),sin(ang),cos(ang));uv=ar*uv;
uv=mat2(uRotation.x,-uRotation.y,uRotation.y,uRotation.x)*uv;
vec3 col=vec3(0.);for(float i=0.;i<1.;i+=.25){float depth=fract(i+uStarSpeed*uSpeed),scale=mix(20.*uDensity,.5*uDensity,depth),fade=depth*smoothstep(1.,.9,depth);col+=StarLayer(uv*scale+i*453.32)*fade;}
if(uTransparent){float a=length(col);a=smoothstep(0.,.3,a);a=min(a,1.);gl_FragColor=vec4(col,a);}else gl_FragColor=vec4(col,1.);}`;

let sm={x:.5,y:.5},tm={x:.5,y:.5},sa=0,ta=0;
const prog=new OGL.Program(gl,{vertex:vs,fragment:fs,uniforms:{
uTime:{value:0},uResolution:{value:new OGL.Color(c.width,c.height,c.width/c.height)},uFocal:{value:new Float32Array([.5,.5])},
uRotation:{value:new Float32Array([1.,0.])},uStarSpeed:{value:.5},uDensity:{value:1},uHueShift:{value:230},uSpeed:{value:.8},
uMouse:{value:new Float32Array([.5,.5])},uGlowIntensity:{value:.5},uSaturation:{value:.2},uMouseRepulsion:{value:true},
uTwinkleIntensity:{value:.4},uRotationSpeed:{value:.08},uRepulsionStrength:{value:2},uMouseActiveFactor:{value:0},
uAutoCenterRepulsion:{value:0},uTransparent:{value:true}}});
const mesh=new OGL.Mesh(gl,{geometry:new OGL.Triangle(gl),program:prog});
function resize(){gl.renderer.setSize(c.offsetWidth,c.offsetHeight);prog.uniforms.uResolution.value=new OGL.Color(gl.canvas.width,gl.canvas.height,gl.canvas.width/gl.canvas.height)}
window.addEventListener('resize',resize);resize();
document.addEventListener('mousemove',e=>{tm.x=e.clientX/window.innerWidth;tm.y=1-e.clientY/window.innerHeight;ta=1});
document.addEventListener('mouseleave',()=>{ta=0});
function loop(t){requestAnimationFrame(loop);prog.uniforms.uTime.value=t*.001;prog.uniforms.uStarSpeed.value=t*.001*.5/10;
sm.x+=(tm.x-sm.x)*.05;sm.y+=(tm.y-sm.y)*.05;sa+=(ta-sa)*.05;
prog.uniforms.uMouse.value[0]=sm.x;prog.uniforms.uMouse.value[1]=sm.y;prog.uniforms.uMouseActiveFactor.value=sa;
gl.renderer.render({scene:mesh})}
requestAnimationFrame(loop);
})();
