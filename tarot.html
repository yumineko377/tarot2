let drawCount=1,selectedCards=new Set(),deck=[];
let spreadDeck=[],spreadSlots=[],usedSpreadIndices=new Set(),spreadIdx=-1;

function shuf(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function goPage(n){bid('app').className='app p'+n;if(n===0){bid('revealBtn').style.animation='';bid('hint').textContent='🃏 滑动牌桌 → 点击选牌 → 翻开'}if(n===2)renderSpreadList()}
function bid(id){return document.getElementById(id)}
// === P0 ===
function buildDeck(){deck=shuf(A).map(c=>({...c,reversed:Math.random()<.5}));selectedCards.clear();updateCount();bid('hint').textContent='🃏 滑动牌桌 → 点击选牌 → 翻开'}
function renderTable(){let t=bid('table');t.innerHTML='';deck.forEach((c,i)=>{let d=document.createElement('div');d.className='card';d.style.transform='rotate('+((Math.random()-.5)*5)+'deg)';d.innerHTML='<div class="card-num">'+(i+1)+'</div><div class="select-ring"></div><div class="card-inner"><div class="card-back"><img src="card_back.png" alt="" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.star\').style.display=\'block\'"><div class="star" style="display:none">✦</div></div></div>';d.addEventListener('click',function(e){e.stopPropagation();toggleCard(i,d)});t.appendChild(d)});bid('tableWrap').scrollLeft=0}
function toggleCard(i,el){if(selectedCards.has(i)){selectedCards.delete(i);el.classList.remove('selected')}else{if(selectedCards.size>=drawCount){let f=selectedCards.values().next().value;selectedCards.delete(f);document.querySelectorAll('#table .card')[f].classList.remove('selected')}selectedCards.add(i);el.classList.add('selected')}updateCount();let h=bid('hint'),btn=bid('revealBtn');if(selectedCards.size===drawCount){h.textContent='✨ 已选满，点击翻开';btn.style.animation='pulse 1.5s infinite'}else{h.textContent='🃏 已选 '+selectedCards.size+'/'+drawCount+' 张';btn.style.animation=''}}
function updateCount(){bid('count').textContent='已选 '+selectedCards.size+'/'+drawCount+' 张'}
function shuffleDeck(){buildDeck();renderTable();updateCount();bid('revealBtn').style.animation=''}
const wrap=bid('tableWrap');wrap.addEventListener('wheel',function(e){e.preventDefault();wrap.scrollBy({left:e.deltaY||e.deltaX,behavior:'smooth'})},{passive:false});
function shiftTable(d){bid('tableWrap').scrollBy({left:d,behavior:'smooth'})}
document.querySelectorAll('#selectPage .top-bar button[data-n]').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('#selectPage .top-bar button[data-n]').forEach(x=>x.classList.remove('active'));this.classList.add('active');drawCount=parseInt(this.dataset.n);shuffleDeck()})});
function goReveal(){if(selectedCards.size===0){bid('hint').textContent='请先选牌！';return}let grid=bid('revealGrid');grid.innerHTML='';let arr=Array.from(selectedCards).sort((a,b)=>a-b),cards=arr.map(i=>deck[i]);let bp=[];bp.push('请帮我解读以下塔罗牌：\n');cards.forEach((c,i)=>{let el=document.createElement('div');el.className='rev-card'+(c.reversed?' reversed':'');let isrc='PaiMian/'+c.en.replace(/ /g,'_')+'.png';el.innerHTML='<div class="rev-card-inner"><div class="rev-face rev-back"><img src="card_back.png" alt=""></div><div class="rev-face rev-front"><img src="'+isrc+'" alt="'+c.zh+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=\\\'r-icon\\\'>'+c.icon+'</div><div class=\\\'r-en\\\'>'+c.en+'</div>\';this.parentElement.style.background=\'linear-gradient(180deg,#faf5ef,#f0e8d8)\'"></div></div><div class="rev-label">'+c.icon+' '+c.zh+'<span class="rev-pos-tag '+(c.reversed?'rev':'up')+'">'+(c.reversed?'逆位':'正位')+'</span></div>';bp.push('第'+(i+1)+'张：'+c.zh+'（'+c.en+'）—— '+(c.reversed?'逆位':'正位')+'，关键词：'+(c.reversed?c.rev:c.up));grid.appendChild(el)});bp.push('\n请综合以上塔罗牌，给出详细解读。');bid('copyBtn').dataset.basePrompt=bp.join('\n');bid('questionInput').value='';updatePromptText();bid('revSub').textContent=drawCount+' 张牌 · 点击牌背翻开';document.querySelectorAll('#revealGrid .rev-card').forEach((el,i)=>{el.addEventListener('click',function(){if(el.classList.contains('flipped'))return;el.classList.add('flipped');let f=document.querySelectorAll('#revealGrid .rev-card.flipped').length;bid('revSub').textContent='已翻开 '+f+'/'+cards.length+' 张';if(f===cards.length){bid('revSub').textContent='✦ 全部揭开 ✦';bid('copyBox').style.display='flex'}})});bid('copyBox').style.display='none';goPage(1)}
function updatePromptText(){let q=bid('questionInput').value.trim(),base=bid('copyBtn').dataset.basePrompt;bid('copyBtn').dataset.fullPrompt=q?base.replace('请帮我解读以下塔罗牌：','我想问：'+q+'\n\n请帮我解读以下塔罗牌：'):base}
function copyResult(){let t=bid('copyBtn').dataset.fullPrompt||bid('copyBtn').dataset.basePrompt;navigator.clipboard.writeText(t).then(function(){let b=bid('copyBtn');b.textContent='✅ 已复制！';b.classList.add('copied');setTimeout(function(){b.textContent='📋 复制提示词';b.classList.remove('copied')},2500)})}
bid('questionInput').addEventListener('input',updatePromptText);

function goSpreads(){renderSpreadList();goPage(2)}
function renderSpreadList(){let l=bid('spreadList');l.innerHTML='';SPREADS.forEach((s,i)=>{let d=document.createElement('div');d.className='spread-item';d.innerHTML='<div class="s-name">'+s.name+'</div><div class="s-desc">'+s.cards+'张 · '+s.desc+'</div>';d.addEventListener('click',function(){openSpread(i)});l.appendChild(d)})}
function openSpread(i){spreadIdx=i;let s=SPREADS[i];spreadSlots=new Array(s.cards).fill(null);usedSpreadIndices.clear();bid('spreadTitle').textContent=s.name;bid('spreadDesc').textContent=s.cards+'张 · '+s.desc;bid('spreadHint').textContent='点击下方牌桌填充空位——已选过的牌变灰不可重复';bid('spreadRevealBtn').style.animation='';renderSpreadSlots();buildSpreadDeck();renderSpreadTable();goPage(3)}
function renderSpreadSlots(){let s=SPREADS[spreadIdx],l=bid('spreadLayout');l.style.width=s.w+'px';l.style.height=s.h+'px';l.innerHTML='';s.pos.forEach((p,i)=>{let el=document.createElement('div');el.className='spread-slot';el.style.left=p.x+'px';el.style.top=p.y+'px';let filled=!!spreadSlots[i];el.innerHTML='<div class="slot-card'+(filled?' filled':'')+'" id="slot'+i+'" onclick="cancelSlot('+i+')">'+(filled?'<img src="card_back.png" alt=""><div class="slot-num" style="position:absolute">'+(i+1)+'</div>':'<div class="slot-num">'+(i+1)+'</div>')+'</div><div class="slot-label"><span class="slot-title">'+p.t+'</span><span class="slot-desc">'+p.d+'</span></div>';l.appendChild(el)})}
function buildSpreadDeck(){spreadDeck=shuf(A).map(c=>({...c,reversed:Math.random()<.5}))}
function renderSpreadTable(){let t=bid('spreadTable');t.innerHTML='';spreadDeck.forEach((c,i)=>{let d=document.createElement('div');d.className='card';if(usedSpreadIndices.has(i))d.classList.add('used');d.style.transform='rotate('+((Math.random()-.5)*5)+'deg)';d.dataset.index=i;d.innerHTML='<div class="card-num">'+(i+1)+'</div><div class="select-ring"></div><div class="card-inner"><div class="card-back"><img src="card_back.png" alt="" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.star\').style.display=\'block\'"><div class="star" style="display:none">✦</div></div></div>';d.addEventListener('click',function(e){e.stopPropagation();fillSlot(i,d)});t.appendChild(d)});let sw=bid('spreadTableWrap');if(sw)sw.scrollLeft=0}
function fillSlot(i,el){if(usedSpreadIndices.has(i))return;if(spreadSlots.every(s=>s))return;let idx=spreadSlots.indexOf(null);if(idx===-1)return;spreadSlots[idx]=spreadDeck[i];usedSpreadIndices.add(i);renderSpreadSlots();renderSpreadTable();if(spreadSlots.every(s=>s)){bid('spreadHint').textContent='✨ 全部填充完毕，点击翻开牌阵！';bid('spreadRevealBtn').style.animation='pulse 1.5s infinite'}else{bid('spreadHint').textContent='已填充 '+spreadSlots.filter(s=>s).length+'/'+spreadSlots.length+' 个位置——点击上方已填充牌可取消重选'}}
function cancelSlot(i){if(spreadSlots[i]){let idx=spreadDeck.indexOf(spreadSlots[i]);if(idx>=0)usedSpreadIndices.delete(idx);spreadSlots[i]=null;renderSpreadSlots();renderSpreadTable();bid('spreadHint').textContent='点击下方牌桌填充空位——已选过的牌变灰不可重复';bid('spreadRevealBtn').style.animation=''}}
function shuffleSpreadDeck(){buildSpreadDeck();usedSpreadIndices.clear();spreadSlots=new Array(SPREADS[spreadIdx].cards).fill(null);renderSpreadSlots();renderSpreadTable();bid('spreadHint').textContent='点击下方牌桌填充空位';bid('spreadRevealBtn').style.animation=''}
const sw2=bid('spreadTableWrap');if(sw2)sw2.addEventListener('wheel',function(e){e.preventDefault();sw2.scrollBy({left:e.deltaY||e.deltaX,behavior:'smooth'})},{passive:false});
function shiftSpreadTable(d){let w=bid('spreadTableWrap');if(w)w.scrollBy({left:d,behavior:'smooth'})}

function goSpreadReveal(){if(!spreadSlots.every(s=>s)){bid('spreadHint').textContent='请先填满所有牌位！';return}let s=SPREADS[spreadIdx],l=bid('spreadRevealLayout'),sc=1.0;l.style.width=(s.w*sc)+'px';l.style.height=(s.h*sc+50)+'px';l.innerHTML='';bid('spreadRevealTitle').textContent=s.name;bid('spreadRevealSub').textContent=s.cards+' 张牌 · 点击牌背逐一翻开';let bp=[];bp.push('请用'+s.name+'牌阵解读以下'+s.cards+'张塔罗牌：\n');spreadSlots.forEach((c,i)=>{let el=document.createElement('div');el.className='rev-card-pos'+(c.reversed?' reversed':'');el.style.left=(s.pos[i].x*sc)+'px';el.style.top=(s.pos[i].y*sc)+'px';let isrc='PaiMian/'+c.en.replace(/ /g,'_')+'.png';el.innerHTML='<div class="rev-card-inner"><div class="rev-face rev-back"><img src="card_back.png" alt=""></div><div class="rev-face rev-front"><img src="'+isrc+'" alt="'+c.zh+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=\\\'r-icon\\\'>'+c.icon+'</div><div class=\\\'r-en\\\'>'+c.en+'</div>\';this.parentElement.style.background=\'linear-gradient(180deg,#faf5ef,#f0e8d8)\'"></div></div><div class="rev-pos-label"><span class="rp-title">'+s.pos[i].t+'</span><span class="rp-desc">'+s.pos[i].d+'</span><span class="rp-card">'+c.icon+' '+c.zh+'<span class="rev-pos-tag '+(c.reversed?'rp-rev':'rp-up')+'">'+(c.reversed?'逆位':'正位')+'</span></span></div>';bp.push(s.pos[i].t+'（牌'+(i+1)+'）：'+c.zh+'（'+c.en+'）—— '+(c.reversed?'逆位':'正位')+'，关键词：'+(c.reversed?c.rev:c.up));l.appendChild(el);el.addEventListener('click',function(){if(el.classList.contains('flipped'))return;el.classList.add('flipped');let f=document.querySelectorAll('#spreadRevealLayout .rev-card-pos.flipped').length;bid('spreadRevealSub').textContent='已翻开 '+f+'/'+spreadSlots.length+' 张';if(f===spreadSlots.length){bid('spreadRevealSub').textContent='✦ 全部揭开 ✦';bid('spreadCopyBox').style.display='flex'}})});bp.push('\n请基于'+s.name+'牌阵的结构，给出每张牌在其位置上的详细解读以及整体关联分析。');bid('spreadCopyBtn').dataset.fullPrompt=bp.join('\n');bid('spreadCopyBox').style.display='none';goPage(4)}
function copySpreadResult(){let t=bid('spreadCopyBtn').dataset.fullPrompt;if(!t)return;navigator.clipboard.writeText(t).then(function(){let b=bid('spreadCopyBtn');b.textContent='✅ 已复制！';b.classList.add('copied');setTimeout(function(){b.textContent='📋 复制解牌提示词';b.classList.remove('copied')},2500)})}
